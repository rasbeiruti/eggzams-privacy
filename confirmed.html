<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed — Eggzams</title>
  <style>
    :root {
      --shell: #FDF6EC;
      --yolk: #F5A623;
      --deep: #2D2A26;
      --hatch: #3DA35D;
      --muted: #9B9287;
      --card: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--shell);
      color: var(--deep);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid rgba(155,146,135,0.18);
      border-radius: 20px;
      max-width: 420px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(45,42,38,0.06);
    }
    .egg {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--deep);
    }
    .tick {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--hatch);
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 18px;
    }
    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .steps {
      text-align: left;
      background: rgba(245,166,35,0.08);
      border-radius: 14px;
      padding: 18px 20px;
      margin: 22px 0 8px;
    }
    .steps ol { margin: 0; padding-left: 20px; }
    .steps li { color: var(--deep); font-size: 15px; margin: 6px 0; }
    .foot {
      margin-top: 22px;
      font-size: 13px;
      color: var(--muted);
    }
    .brand {
      font-weight: 700;
      color: var(--yolk);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="egg">🥚</div>
      <h1>You're all set!</h1>
      <div class="tick">✓ Email confirmed</div>
      <p>Your <span class="brand">Eggzams</span> account is now active.</p>
      <div class="steps">
        <ol>
          <li>Close this browser tab.</li>
          <li>Open the <strong>Eggzams</strong> app.</li>
          <li>Sign in with your email and password.</li>
        </ol>
      </div>
      <p>Time to start cracking your exams.</p>
      <div class="foot">
        Didn't mean to sign up? You can ignore this page — no further action is needed.
      </div>
    </div>
  </div>
</body>
</html>
